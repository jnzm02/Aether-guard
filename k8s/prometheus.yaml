# ─────────────────────────────────────────────────────────────────────────────
# Prometheus — scrapes target-service and evaluates SLO alert rules.
#
# Includes:
#   ClusterRole     — read-only access to pods/endpoints for service discovery
#   ConfigMap       — prometheus.yml + SLO recording/alert rules
#   PersistentVolumeClaim — 5 Gi for TSDB storage (7-day retention)
#   Deployment      — single replica (HA requires Prometheus Operator / Thanos)
#   Service         — ClusterIP + NodePort for local access
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: aether-guard
  labels:
    app: prometheus
    app.kubernetes.io/part-of: aether-guard
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aether-guard-prometheus
  labels:
    app: prometheus
    app.kubernetes.io/part-of: aether-guard
rules:
  - apiGroups: [""]
    resources: [nodes, nodes/proxy, services, endpoints, pods]
    verbs: [get, list, watch]
  - apiGroups: [extensions, networking.k8s.io]
    resources: [ingresses]
    verbs: [get, list, watch]
  - nonResourceURLs: [/metrics]
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: aether-guard-prometheus
  labels:
    app: prometheus
    app.kubernetes.io/part-of: aether-guard
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: aether-guard-prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: aether-guard
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: aether-guard
  labels:
    app: prometheus
    app.kubernetes.io/part-of: aether-guard
data:
  prometheus.yml: |
    global:
      scrape_interval:     15s
      evaluation_interval: 15s
      scrape_timeout:      10s
      external_labels:
        environment: "kubernetes"
        project:     "aether-guard"

    alerting:
      alertmanagers:
        - static_configs:
            - targets: ["alertmanager:9093"]
          timeout: 10s

    rule_files:
      - "/etc/prometheus/rules/*.yml"

    scrape_configs:
      - job_name: "target-service"
        static_configs:
          - targets: ["target-service:8080"]
        metrics_path: /metrics

      - job_name: "kubernetes-pods"
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [aether-guard]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__

  slo_alerts.yml: |
    groups:
      - name: aether_guard_slo_recording
        interval: 30s
        rules:
          - record: job:aether_guard_error_ratio:rate5m
            expr: |
              sum(rate(aether_guard_http_requests_total{status_code=~"5.."}[5m]))
              / sum(rate(aether_guard_http_requests_total[5m]))
          - record: job:aether_guard_error_ratio:rate30m
            expr: |
              sum(rate(aether_guard_http_requests_total{status_code=~"5.."}[30m]))
              / sum(rate(aether_guard_http_requests_total[30m]))
          - record: job:aether_guard_latency_p99:rate5m
            expr: |
              histogram_quantile(0.99,
                sum(rate(aether_guard_http_request_duration_seconds_bucket[5m])) by (le))
          - record: job:aether_guard_latency_p50:rate5m
            expr: |
              histogram_quantile(0.50,
                sum(rate(aether_guard_http_request_duration_seconds_bucket[5m])) by (le))

      - name: aether_guard_slo_alerts
        rules:
          - alert: SLOErrorBudgetBurnCritical
            expr: job:aether_guard_error_ratio:rate5m > 0.05
            for: 2m
            labels:
              severity: critical
              service: target-service
            annotations:
              summary: "CRITICAL: error budget burning fast (>5% error rate)"
              runbook_url: "https://github.com/your-org/aether-guard/blob/main/docs/runbooks/high-error-rate.md"

          - alert: SLOErrorBudgetBurnWarning
            expr: job:aether_guard_error_ratio:rate30m > 0.005
            for: 5m
            labels:
              severity: warning
              service: target-service
            annotations:
              summary: "WARNING: elevated error rate over 30m (>0.5%)"
              runbook_url: "https://github.com/your-org/aether-guard/blob/main/docs/runbooks/high-error-rate.md"

          - alert: SLOLatencyP99Breach
            expr: job:aether_guard_latency_p99:rate5m > 0.2
            for: 2m
            labels:
              severity: critical
              service: target-service
            annotations:
              summary: "CRITICAL: p99 latency breaches 200ms SLO"
              runbook_url: "https://github.com/your-org/aether-guard/blob/main/docs/runbooks/high-latency.md"

          - alert: MemorySaturationWarning
            expr: aether_guard_chaos_memleak_bytes_allocated > 104857600
            for: 1m
            labels:
              severity: warning
              service: target-service
            annotations:
              summary: "WARNING: memory leak detected"
              runbook_url: "https://github.com/your-org/aether-guard/blob/main/docs/runbooks/memory-leak.md"

          - alert: TargetServiceDown
            expr: up{job="target-service"} == 0
            for: 30s
            labels:
              severity: critical
              service: target-service
            annotations:
              summary: "CRITICAL: target-service is DOWN"
              runbook_url: "https://github.com/your-org/aether-guard/blob/main/docs/runbooks/service-down.md"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  namespace: aether-guard
  labels:
    app: prometheus
    app.kubernetes.io/part-of: aether-guard
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: aether-guard
  labels:
    app: prometheus
    app.kubernetes.io/component: prometheus
    app.kubernetes.io/part-of: aether-guard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      securityContext:
        fsGroup: 65534   # prometheus user
      containers:
        - name: prometheus
          image: prom/prometheus:v2.48.0
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=7d
            - --web.enable-lifecycle
            - --web.enable-admin-api
          ports:
            - name: http
              containerPort: 9090
          resources:
            requests:
              cpu:    200m
              memory: 512Mi
            limits:
              cpu:    500m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: rules
              mountPath: /etc/prometheus/rules
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
            items:
              - key: prometheus.yml
                path: prometheus.yml
        - name: rules
          configMap:
            name: prometheus-config
            items:
              - key: slo_alerts.yml
                path: slo_alerts.yml
        - name: data
          persistentVolumeClaim:
            claimName: prometheus-data
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: aether-guard
  labels:
    app: prometheus
    app.kubernetes.io/part-of: aether-guard
spec:
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: http
      nodePort: 30090
  type: NodePort
