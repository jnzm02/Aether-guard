name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Go service: build + vet + test ──────────────────────────────────────
  go-build:
    name: Go — Build, Vet & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/target-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache-dependency-path: services/target-service/go.sum

      - name: Download modules
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 -timeout=60s ./...

  # ── 2. Python: lint agent + listener + scripts ──────────────────────────────
  python-lint:
    name: Python — Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff==0.4.4

      - name: Lint agent
        run: ruff check services/agent/

      - name: Lint listener
        run: ruff check services/listener/

      - name: Lint scripts
        run: ruff check scripts/

  # ── 3. Python: unit tests (agent + listener) ────────────────────────────────
  python-test:
    name: Python — Unit Tests
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: "test-ci-placeholder"
      DRY_RUN: "true"
      CONFIDENCE_THRESHOLD: "0.75"
      PROMETHEUS_URL: "http://localhost:9090"
      TARGET_CONTAINER: "target-service"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install agent test dependencies
        run: pip install -r services/agent/requirements.txt -r services/agent/requirements-dev.txt

      - name: Install listener test dependencies
        run: pip install -r services/listener/requirements.txt -r services/listener/requirements-dev.txt

      - name: Test agent
        run: |
          python -m pytest services/agent/tests/ \
            -v --tb=short \
            --junitxml=reports/agent-tests.xml

      - name: Test listener
        run: |
          python -m pytest services/listener/tests/ \
            --import-mode=importlib \
            -v --tb=short \
            --junitxml=reports/listener-tests.xml

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-test-reports
          path: reports/

  # ── 4. Prometheus & Alertmanager config validation ──────────────────────────
  validate-infra-config:
    name: Infra — Validate Prometheus & Alertmanager Config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install promtool + amtool
        run: |
          wget -q https://github.com/prometheus/prometheus/releases/download/v2.48.0/prometheus-2.48.0.linux-amd64.tar.gz
          tar -xzf prometheus-2.48.0.linux-amd64.tar.gz
          sudo mv prometheus-2.48.0.linux-amd64/promtool /usr/local/bin/
          wget -q https://github.com/prometheus/alertmanager/releases/download/v0.26.0/alertmanager-0.26.0.linux-amd64.tar.gz
          tar -xzf alertmanager-0.26.0.linux-amd64.tar.gz
          sudo mv alertmanager-0.26.0.linux-amd64/amtool /usr/local/bin/

      - name: Check Prometheus config
        run: promtool check config infra/prometheus/prometheus.yml

      - name: Check SLO alert rules
        run: promtool check rules infra/prometheus/rules/slo_alerts.yml

      - name: Check Alertmanager config
        run: amtool check-config infra/alertmanager/alertmanager.yml

  # ── 5. Docker: build all images ─────────────────────────────────────────────
  docker-build:
    name: Docker — Build All Images
    runs-on: ubuntu-latest
    needs: [go-build, python-lint, python-test, validate-infra-config]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build target-service
        run: docker build -t aether-guard/target-service:ci services/target-service

      - name: Build listener
        run: docker build -t aether-guard/listener:ci services/listener

      - name: Build agent
        run: docker build -t aether-guard/agent:ci services/agent

  # ── 6. Integration smoke test (docker compose) ──────────────────────────────
  integration-smoke:
    name: Integration — Stack Smoke Test
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4

      - name: Create stub .env for CI
        run: |
          echo "ANTHROPIC_API_KEY=sk-ant-ci-placeholder" > .env
          echo "CLAUDE_MODEL=claude-sonnet-4-5-20250929" >> .env
          echo "DRY_RUN=true" >> .env
          echo "CONFIDENCE_THRESHOLD=0.75" >> .env
          echo "POLL_INTERVAL=10" >> .env

      - name: Start stack
        working-directory: infra
        run: docker compose up -d --build

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for target-service..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/health && break
            sleep 2
          done

          echo "Waiting for listener..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:8081/health && break
            sleep 2
          done

          echo "Waiting for agent..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:8082/health && break
            sleep 2
          done

      - name: Smoke test — golden signals endpoint
        run: |
          curl -sf http://localhost:8080/api/users | jq .
          curl -sf http://localhost:8080/metrics | grep aether_guard_http_requests_total

      - name: Smoke test — Prometheus targets
        run: |
          curl -sf "http://localhost:9090/api/v1/query?query=up" | jq '.data.result | length'

      - name: Smoke test — Alertmanager status
        run: curl -sf http://localhost:9093/-/healthy

      - name: Dump logs on failure
        if: failure()
        working-directory: infra
        run: docker compose logs

      - name: Tear down
        if: always()
        working-directory: infra
        run: docker compose down -v
