name: CD (Production Deployment)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  REGISTRY: ${{ secrets.DOCKER_REGISTRY }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ── 1. Build & Push Docker Images to Private Registry ──────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment }}

    outputs:
      image_tag: ${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Private Registry
        run: |
          echo "${{ secrets.DOCKER_REGISTRY_PASSWORD }}" | docker login ${{ secrets.DOCKER_REGISTRY }} \
            -u "${{ secrets.DOCKER_REGISTRY_USERNAME }}" --password-stdin

      - name: Build & Push target-service
        uses: docker/build-push-action@v5
        with:
          context: ./services/target-service
          push: true
          tags: |
            ${{ secrets.DOCKER_REGISTRY }}/aether-guard/target-service:${{ github.sha }}
            ${{ secrets.DOCKER_REGISTRY }}/aether-guard/target-service:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_REGISTRY }}/aether-guard/target-service:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_REGISTRY }}/aether-guard/target-service:buildcache,mode=max

      - name: Build & Push listener
        uses: docker/build-push-action@v5
        with:
          context: ./services/listener
          push: true
          tags: |
            ${{ secrets.DOCKER_REGISTRY }}/aether-guard/listener:${{ github.sha }}
            ${{ secrets.DOCKER_REGISTRY }}/aether-guard/listener:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_REGISTRY }}/aether-guard/listener:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_REGISTRY }}/aether-guard/listener:buildcache,mode=max

      - name: Build & Push agent
        uses: docker/build-push-action@v5
        with:
          context: ./services/agent
          push: true
          tags: |
            ${{ secrets.DOCKER_REGISTRY }}/aether-guard/agent:${{ github.sha }}
            ${{ secrets.DOCKER_REGISTRY }}/aether-guard/agent:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_REGISTRY }}/aether-guard/agent:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_REGISTRY }}/aether-guard/agent:buildcache,mode=max

  # ── 2. Deploy to DigitalOcean Droplet via SSH ──────────────────────────────
  deploy:
    name: Deploy to ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: ${{ github.event.inputs.environment }}
      url: ${{ vars.APP_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Copy deployment files to server
        run: |
          scp -i ~/.ssh/deploy_key -r \
            infra/docker-compose.yml \
            infra/prometheus \
            infra/alertmanager \
            infra/grafana \
            scripts/deploy.sh \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/aether-guard/

      - name: Copy environment configuration
        run: |
          # Create production .env file from secrets
          cat > .env.production << EOF
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL=claude-sonnet-4-5-20250929
          CONFIDENCE_THRESHOLD=0.75
          DRY_RUN=false
          POLL_INTERVAL=10
          DOCKER_REGISTRY=${{ secrets.DOCKER_REGISTRY }}
          DOCKER_REGISTRY_USERNAME=${{ secrets.DOCKER_REGISTRY_USERNAME }}
          DOCKER_REGISTRY_PASSWORD=${{ secrets.DOCKER_REGISTRY_PASSWORD }}
          IMAGE_TAG=${{ github.sha }}
          EOF

          scp -i ~/.ssh/deploy_key .env.production \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/aether-guard/.env

      - name: Deploy application
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            cd /opt/aether-guard

            # Login to private registry
            echo "${{ secrets.DOCKER_REGISTRY_PASSWORD }}" | docker login ${{ secrets.DOCKER_REGISTRY }} \
              -u "${{ secrets.DOCKER_REGISTRY_USERNAME }}" --password-stdin

            # Run deployment script
            chmod +x scripts/deploy.sh
            ./scripts/deploy.sh ${{ github.sha }}
          EOF

      - name: Health check
        run: |
          echo "Waiting 30s for services to start..."
          sleep 30

          ssh -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            # Check all service health endpoints
            curl -sf http://localhost:8080/health || exit 1
            curl -sf http://localhost:8081/health || exit 1
            curl -sf http://localhost:8082/health || exit 1
            curl -sf http://localhost:9090/-/healthy || exit 1
            curl -sf http://localhost:9093/-/healthy || exit 1

            echo "✅ All services are healthy!"
          EOF

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

  # ── 3. Post-Deployment Verification ────────────────────────────────────────
  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: deploy
    environment:
      name: ${{ github.event.inputs.environment }}

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Check running containers
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            echo "=== Running Containers ==="
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Image}}"

            echo ""
            echo "=== Disk Usage ==="
            df -h /opt/aether-guard

            echo ""
            echo "=== Recent Logs (last 20 lines) ==="
            cd /opt/aether-guard/infra
            docker compose logs --tail=20
          EOF

      - name: Test Prometheus targets
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            echo "=== Prometheus Targets ==="
            curl -sf "http://localhost:9090/api/v1/targets" | jq '.data.activeTargets[] | {job: .labels.job, health: .health}'
          EOF

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

  # ── 4. Rollback (Manual Trigger Only) ───────────────────────────────────────
  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    if: failure() && github.event.inputs.environment == 'production'
    needs: [deploy, verify]
    environment:
      name: ${{ github.event.inputs.environment }}

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Execute rollback
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            cd /opt/aether-guard

            echo "⚠️  Rolling back to previous deployment..."

            # Restore previous .env backup
            if [ -f .env.backup ]; then
              cp .env.backup .env
              echo "✅ Restored previous environment configuration"
            fi

            # Restore previous docker-compose state
            cd infra
            docker compose down
            docker compose up -d

            echo "✅ Rollback complete. Verify services:"
            docker compose ps
          EOF

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key